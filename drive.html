<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Drive Simulator - MyClass1TrainingApp</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
      touch-action: none;
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100vw;
    }
    #game-container {
      position: relative;
      flex: 1;
      background: #222;
      overflow: hidden;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #ui-layer {
      position: absolute;
      top: 10px;
      left: 10px;
      pointer-events: none;
      color: #ffd700;
      text-shadow: 1px 1px 2px black;
      font-weight: bold;
      font-size: 14px;
    }
    .controls {
      position: absolute;
      bottom: 20px;
      width: 100%;
      display: flex;
      justify-content: space-around;
      padding: 0 20px;
      pointer-events: none;
    }
    .btn {
      width: 70px;
      height: 70px;
      background: rgba(255,255,255,0.1);
      border: 2px solid #ffd700;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: white;
      pointer-events: auto;
      user-select: none;
    }
    .btn:active { background: rgba(255, 215, 0, 0.4); }
    #back-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      padding: 8px 15px;
      background: #444;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      font-size: 12px;
      z-index: 100;
    }
  </style>
</head>
<body>

  <a id="back-btn" href="index.html">⬅ MENU</a>

  <div id="game-container">
    <div id="ui-layer">
      Speed: <span id="speed-val">0</span> km/h<br>
      Gear: <span id="gear-val">D</span>
    </div>
    <canvas id="driveCanvas"></canvas>

    <div class="controls">
      <div style="display:flex; gap:10px;">
        <div class="btn" id="left-btn">◀</div>
        <div class="btn" id="right-btn">▶</div>
      </div>
      <div style="display:flex; gap:10px;">
        <div class="btn" id="brake-btn">🛑</div>
        <div class="btn" id="gas-btn">⛽</div>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('driveCanvas');
    const ctx = canvas.getContext('2d');
    const speedEl = document.getElementById('speed-val');

    let width, height;
    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    const truck = {
      x: 0,
      y: 0,
      angle: -Math.PI / 2,
      speed: 0,
      steerAngle: 0,
      maxSteer: 0.5,
      width: 40,
      length: 80,
      color: '#ffd700'
    };

    truck.x = width / 2;
    truck.y = height / 2;

    const keys = {};
    window.addEventListener('keydown', e => keys[e.key] = true);
    window.addEventListener('keyup', e => keys[e.key] = false);

    // Touch controls
    const touch = { left: false, right: false, gas: false, brake: false };
    setupTouch('left-btn', 'left');
    setupTouch('right-btn', 'right');
    setupTouch('gas-btn', 'gas');
    setupTouch('brake-btn', 'brake');

    function setupTouch(id, prop) {
      const el = document.getElementById(id);
      el.addEventListener('touchstart', (e) => { e.preventDefault(); touch[prop] = true; });
      el.addEventListener('touchend', (e) => { e.preventDefault(); touch[prop] = false; });
    }

    function update() {
      // Acceleration / Braking
      if (keys['ArrowUp'] || keys['w'] || touch.gas) {
        truck.speed += 0.1;
      } else if (keys['ArrowDown'] || keys['s'] || touch.brake) {
        truck.speed -= 0.2;
      } else {
        truck.speed *= 0.98; // Friction
      }
      
      truck.speed = Math.max(-2, Math.min(truck.speed, 5));

      // --- INSTANT STEERING FIX ---
      // Removed gradual increments and "lerping" back to center.
      if (keys['ArrowLeft'] || keys['a'] || touch.left) {
        truck.steerAngle = -truck.maxSteer;
      } else if (keys['ArrowRight'] || keys['d'] || touch.right) {
        truck.steerAngle = truck.maxSteer;
      } else {
        truck.steerAngle = 0; // Instant snap-back to center
      }

      // Movement logic
      if (Math.abs(truck.speed) > 0.1) {
        const direction = truck.speed > 0 ? 1 : -1;
        truck.angle += truck.steerAngle * (truck.speed / 50);
        truck.x += Math.cos(truck.angle) * truck.speed;
        truck.y += Math.sin(truck.angle) * truck.speed;
      }

      speedEl.innerText = Math.abs(Math.round(truck.speed * 20));
    }

    function draw() {
      ctx.fillStyle = '#222';
      ctx.fillRect(0, 0, width, height);

      // Draw "Road" grid
      ctx.strokeStyle = '#333';
      for(let i=0; i<width; i+=50) {
        ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, height); ctx.stroke();
      }
      for(let j=0; j<height; j+=50) {
        ctx.beginPath(); ctx.moveTo(0, j); ctx.lineTo(width, j); ctx.stroke();
      }

      // Draw Truck
      ctx.save();
      ctx.translate(truck.x, truck.y);
      ctx.rotate(truck.angle);
      
      // Cab
      ctx.fillStyle = truck.color;
      ctx.fillRect(-truck.length/2, -truck.width/2, truck.length, truck.width);
      
      // Windshield
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.fillRect(10, -truck.width/2 + 5, 10, truck.width - 10);
      
      ctx.restore();
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }
    loop();
  </script>
</body>
</html>
